// === WEB AUDIO API SOUND SYSTEM ===
let audioCtx = null;
let masterVolume = 0.15;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playSound(type) {
  try {
    initAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    gain.gain.setValueAtTime(masterVolume, now);
    
    switch(type) {
      case 'collect':
        osc.frequency.setValueAtTime(880, now);
        osc.frequency.exponentialRampToValueAtTime(1200, now + 0.08);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc.start(now); osc.stop(now + 0.15);
        break;
      case 'combine':
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, now);
        osc.frequency.setValueAtTime(659, now + 0.1);
        osc.frequency.setValueAtTime(784, now + 0.2);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
        osc.start(now); osc.stop(now + 0.4);
        break;
      case 'levelUp':
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.exponentialRampToValueAtTime(800, now + 0.15);
        osc.frequency.setValueAtTime(600, now + 0.15);
        osc.frequency.exponentialRampToValueAtTime(1200, now + 0.3);
        gain.gain.setValueAtTime(masterVolume * 1.2, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
        osc.start(now); osc.stop(now + 0.5);
        break;
      case 'click':
        osc.type = 'square';
        osc.frequency.setValueAtTime(600, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
        osc.start(now); osc.stop(now + 0.05);
        break;
    }
  } catch(e) {}
}

  }

    indicator.style = 'position:fixed;top:10px;right:10px;background:rgba(0,200,100,0.9);color:white;padding:5px 15px;border-radius:20px;font-size:12px;font-weight:bold;z-index:1000;opacity:0;transition:opacity 0.3s;';
    document.body.appendChild(indicator);
  }
  indicator.textContent = 'ðŸ’¾ Saved!';
  indicator.style.opacity = '1';
  setTimeout(() => indicator.style.opacity = '0', 1500);
}

// === GAME ===
let canvas, ctx, animId;

function startGame() {
  const name = document.getElementById('player-name').value.trim() || 'Alchemist';
  state.name = name;
  save();

  document.getElementById('start').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  document.getElementById('hud-name').textContent = state.name;

  canvas = document.getElementById('canvas');
  ctx = canvas.getContext('2d');
  resize();
  window.addEventListener('resize', resize);
  canvas.addEventListener('click', onCanvasClick);
  canvas.addEventListener('touchstart', onTouchStart, { passive: false });

  load();
  updateHUD();
  renderGrimoire();

  if (!localStorage.getItem('nemo-tutorial-done')) { tutorialStep = 0; showTutorial(); }
  
  // PHASE 2: WASD Input
  window.addEventListener('keydown', (e) => {
    state.keys[e.key.toLowerCase()] = true;
  });
  window.addEventListener('keyup', (e) => {
    state.keys[e.key.toLowerCase()] = false;
  });
  
  // Auto-Save regelmaessig (60s) + bei Page-Close
  setInterval(() => save(), 60000);
  window.addEventListener('beforeunload', () => save());
  
  loop();
}

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

function loop() {
  update();
  draw();
  animId = requestAnimationFrame(loop);
}

function update() {
  // PHASE 2: Avatar Bewegung
  const avatar = state.avatar;
  
  // PHASE 3: Animation time â€” fÃ¼r "Symbole atmen"
  state.animTime += 0.016; // ~60fps
  avatar.isMoving = false;
  avatar.direction.x = 0;
  avatar.direction.y = 0;
  
  // Sprint check (Shift)
  const isSprinting = state.keys['shift'];
  const currentSpeed = isSprinting ? avatar.speed * 2 : avatar.speed;
  
  if (state.keys['w'] || state.keys['arrowup']) {
    avatar.direction.y = -1;
    avatar.isMoving = true;
  }
  if (state.keys['s'] || state.keys['arrowdown']) {
    avatar.direction.y = 1;
    avatar.isMoving = true;
  }
  if (state.keys['a'] || state.keys['arrowleft']) {
    avatar.direction.x = -1;
    avatar.isMoving = true;
  }
  if (state.keys['d'] || state.keys['arrowright']) {
    avatar.direction.x = 1;
    avatar.isMoving = true;
  }
  
  // Normalize diagonal movement
  if (avatar.isMoving) {
    const len = Math.sqrt(avatar.direction.x ** 2 + avatar.direction.y ** 2);
    avatar.x += (avatar.direction.x / len) * currentSpeed;
    avatar.y += (avatar.direction.y / len) * currentSpeed;
    
    // Clamp to world bounds
    avatar.x = Math.max(50, Math.min(state.world.width - 50, avatar.x));
    avatar.y = Math.max(50, Math.min(state.world.height - 50, avatar.y));
  }
  
  // Camera folgen (smooth)
  const targetCamX = avatar.x - canvas.width / 2;
  const targetCamY = avatar.y - canvas.height / 2;
  state.camera.x += (targetCamX - state.camera.x) * 0.1;
  state.camera.y += (targetCamY - state.camera.y) * 0.1;
  
  // Camera clamp to world
  state.camera.x = Math.max(0, Math.min(state.world.width - canvas.width, state.camera.x));
  state.camera.y = Math.max(0, Math.min(state.world.height - canvas.height, state.camera.y));
  
  // Sprint glow effect
  avatar.isSprinting = isSprinting && avatar.isMoving;
  
  // Symbol floating animation (in Welt-Koordinaten)
  const time = Date.now() * 0.001;
  // PHASE 6: Progressive World â€” filter by level
  const maxSymbols = state.getMaxSymbols(state.level);
  for (let i = 0; i < maxSymbols; i++) {
    const s = SYMBOLS[i];
    s.displayY = s.y + Math.sin(time + i) * 5; // 5px floating
  }
  
  // PHASE 2: Auto-Collect wenn Avatar ein Symbol berÃ¼hrt
  if (avatar.isMoving) {
    SYMBOLS.forEach(s => {
      if (state.collected.includes(s.id)) return;
      
      const sx = s.x;
      const sy = s.displayY;
      const ax = avatar.x;
      const ay = avatar.y;
      const dist = Math.sqrt((sx - ax) ** 2 + (sy - ay) ** 2);
      
      if (dist < state.collectRadius) {
        state.collected.push(s.id);
        playSound('collect');
        state.xp += 2;
        showRecipeLog(`ðŸœ ${s.glyph} ${s.name} eingesammelt! +2 XP`);
        checkLevelUp();
        save();
        updateHUD();
        renderGrimoire();

  if (!localStorage.getItem('nemo-tutorial-done')) { tutorialStep = 0; showTutorial(); }
      }
    });
  }
  
  // PHASE 3: Particles updaten
  state.particles = state.particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15; // gravity
    p.life -= 0.025;
    return p.life > 0;
  });
}

function draw() {
  // Background mit Gradient
  const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
  grad.addColorStop(0, '#0a0a12');
  grad.addColorStop(1, '#1a1a2e');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // World Grid (in Welt-Koordinaten, mit Camera-Offset)
  ctx.strokeStyle = 'rgba(155, 89, 182, 0.15)';
  ctx.lineWidth = 1;
  const gridSize = 100;
  const offsetX = -state.camera.x % gridSize;
  const offsetY = -state.camera.y % gridSize;
  
  for (let x = offsetX; x < canvas.width; x += gridSize) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, canvas.height);
    ctx.stroke();
  }
  for (let y = offsetY; y < canvas.height; y += gridSize) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }
  
  // World boundary
  ctx.strokeStyle = 'rgba(231, 76, 60, 0.3)';
  ctx.lineWidth = 3;
  ctx.strokeRect(-state.camera.x, -state.camera.y, state.world.width, state.world.height);
  
  // Mini-Map (World-Koordinaten fÃ¼r Symbole)
  const miniMapX = canvas.width - 160;
  const miniMapY = 10;
  const miniMapW = 150;
  const miniMapH = 150;
  
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(miniMapX, miniMapY, miniMapW, miniMapH);
  ctx.strokeStyle = '#4ecdc4';
  ctx.lineWidth = 1;
  ctx.strokeRect(miniMapX, miniMapY, miniMapW, miniMapH);
  
  const scaleX = miniMapW / state.world.width;
  const scaleY = miniMapH / state.world.height;
  
  // Symbole in Mini-Map (nur aktuelle Level-Symbole)
  const miniMax = state.getMaxSymbols(state.level);
  SYMBOLS.slice(0, miniMax).forEach(s => {
    const collected = state.collected.includes(s.id);
    const mx = miniMapX + s.x * scaleX;
    const my = miniMapY + s.y * scaleY;
    ctx.fillStyle = collected ? s.color : '#555';
    ctx.beginPath();
    ctx.arc(mx, my, 3, 0, Math.PI * 2);
    ctx.fill();
  });
  
  // Avatar in Mini-Map
  ctx.fillStyle = state.avatar.color;
  ctx.beginPath();
  ctx.arc(
    miniMapX + state.avatar.x * scaleX,
    miniMapY + state.avatar.y * scaleY,
    4, 0, Math.PI * 2
  );
  ctx.fill();

  // draw symbols (mit Camera-Offset fÃ¼r Welt-Koordinaten)
  // PHASE 6: Progressive World â€” nur Symbole des aktuellen BIOMES
  const maxSym = state.getMaxSymbols(state.level);
  // Filter: Biome-spezifische Symbole oder alle wenn Biome nicht aktiv
  const visSym = SYMBOLS.filter(s => {
    if (state.currentBiome && s.biome === state.currentBiome) return true;
    return false; // Nur Biome-Symbole zeigen
  }).slice(0, maxSym);
  visSym.forEach(s => {
    const x = s.x - state.camera.x;
    const y = s.displayY - state.camera.y;
    
    // Nur zeichnen wenn auf Screen sichtbar
    if (x < -50 || x > canvas.width + 50 || y < -50 || y > canvas.height + 50) return;
    
    const collected = state.collected.includes(s.id);
    const time = state.animTime;

    // PHASE 3: Symbole atmen â€” Animation berechnen
    const breathPhase = Math.sin(time * 1.5 + s.id.charCodeAt(0) * 0.3); // langsames Atmen
    const pulsePhase = Math.sin(time * 3 + s.id.charCodeAt(0) * 0.5);   // schnelles Pulsieren
    const floatY = breathPhase * 4; // 4px Auf/Ab
    const scale = collected ? 1 + breathPhase * 0.08 : 1; // gesammelte atmen stÃ¤rker
    const glow = collected ? 20 + pulsePhase * 10 : 0; // Glow pulsiert

    ctx.save();
    ctx.font = '48px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // PHASE 3: Animiertes Zeichnen
    const drawX = x;
    const drawY = y + floatY;
    
    // Glow / Schatten fÃ¼r gesammelte Symbole
    if (collected) {
      ctx.shadowColor = s.color;
      ctx.shadowBlur = glow;
    } else {
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 0.5;
    }

    // Skalierung anwenden (via transform)
    ctx.translate(drawX, drawY);
    ctx.scale(scale, scale);
    ctx.translate(-drawX, -drawY);

    ctx.fillStyle = collected ? s.color : '#555';
    ctx.fillText(s.glyph, drawX, drawY);
    ctx.restore();

    // Label schwebt leicht
    ctx.fillStyle = collected ? '#c9b896' : '#555';
    ctx.font = '14px Georgia';
    ctx.textAlign = 'center';
    ctx.fillText(s.name, x, y + 40 + floatY);
  });

  // PHASE 2: Avatar zeichnen (in Welt-Koordinaten, mit Camera-Offset)
  // PHASE 3+: Avatar SKIN — Aussehen ändert sich mit Biome!
  const avatar = state.avatar;
  const ax = avatar.x - state.camera.x;
  const ay = avatar.y - state.camera.y;
  
  // Avatar-Farbe basierend auf aktuellem Biome
  const biome = state.biomes[state.currentBiome];
  const avatarColor = avatar.isSprinting ? '#ffa500' : biome.color;
  const glowColor = avatar.isSprinting ? '#fff' : biome.color;
  
  // Sprint glow intensiver
  const glowIntensity = avatar.isSprinting ? 40 : (avatar.isMoving ? 25 : 15);
  const avatarSize = avatar.isSprinting ? avatar.size * 1.2 : avatar.size;
  
  ctx.save();
  ctx.shadowColor = glowColor;
  ctx.shadowBlur = glowIntensity;
  
  // Körper (Rechteck) — jetzt mit Biome-Farbe
  ctx.fillStyle = avatarColor;
  const bodyWidth = avatarSize * 1.4;
  const bodyHeight = avatarSize * 1.8;
  ctx.fillRect(ax - bodyWidth/2, ay - bodyHeight/2 + avatarSize*0.3, bodyWidth, bodyHeight);
  
  // Kopf (Kreis) — mit Biom-Outline
  ctx.beginPath();
  ctx.arc(ax, ay - bodyHeight/2 + avatarSize*0.3, avatarSize * 0.5, 0, Math.PI * 2);
  ctx.fill();
  
  // Biom-Symbol über dem Kopf
  const biomeIcons = { IGNIS: '🔥', AQUA: '💧', TERRA: '🌍', AETHER: '✨' };
  ctx.font = '16px serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.shadowBlur = 0;
  ctx.fillText(biomeIcons[state.currentBiome], ax, ay - avatarSize * 1.8);
  
  // Weißer Kern
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(ax, ay - bodyHeight/2 + avatarSize*0.3, avatarSize * 0.25, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  
  // Richtung-Indikator (Dreieck das in Bewegungsrichtung zeigt)
  if (avatar.isMoving && (avatar.direction.x !== 0 || avatar.direction.y !== 0)) {
    const angle = Math.atan2(avatar.direction.y, avatar.direction.x);
    ctx.save();
    ctx.translate(ax, ay);
    ctx.rotate(angle);
    ctx.fillStyle = avatar.isSprinting ? '#ffa500' : '#fff';
    ctx.beginPath();
    ctx.moveTo(avatarSize * 1.2, 0);
    ctx.lineTo(avatarSize * 0.6, -avatarSize * 0.4);
    ctx.lineTo(avatarSize * 0.6, avatarSize * 0.4);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
  
  // Sprint indicator
  if (avatar.isSprinting) {
    ctx.fillStyle = '#ffa500';
    ctx.font = 'bold 12px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('âš¡ SPRINT', ax, ay - avatar.size * 2.5);
  }
  
  // Avatar Position im HUD anzeigen (Welt-Koordinaten)
  ctx.fillStyle = '#c9b896';
  ctx.font = '12px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText(`Position: ${avatar.x.toFixed(0)}, ${avatar.y.toFixed(0)} | Welt: ${state.world.width}x${state.world.height}`, 10, canvas.height - 10);
  
  // PHASE 3: Particles zeichnen (BIOME-AWARE)
  state.particles.forEach(p => {
    const px = p.x - state.camera.x;
    const py = p.y - state.camera.y;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color || state.biomes[state.currentBiome].particleColor;
    
    // BIOME-spezifische Partikel-Formen
    const biome = state.currentBiome;
    if (biome === 'IGNIS') {
      // Feuer: Tropfenform
      ctx.beginPath();
      ctx.moveTo(px, py - p.size * p.life * 1.5);
      ctx.quadraticCurveTo(px + p.size * p.life, py, px, py + p.size * p.life);
      ctx.quadraticCurveTo(px - p.size * p.life, py, px, py - p.size * p.life * 1.5);
      ctx.fill();
    } else if (biome === 'AQUA') {
      // Wasser: Welle (oval)
      ctx.beginPath();
      ctx.ellipse(px, py, p.size * p.life * 1.3, p.size * p.life * 0.7, 0, 0, Math.PI * 2);
      ctx.fill();
    } else if (biome === 'TERRA') {
      // Erde: Quadrat (Fels)
      ctx.fillRect(px - p.size * p.life * 0.5, py - p.size * p.life * 0.5, p.size * p.life, p.size * p.life);
    } else {
      // Aether: Dreieck (Geist)
      ctx.beginPath();
      ctx.moveTo(px, py - p.size * p.life);
      ctx.lineTo(px + p.size * p.life * 0.866, py + p.size * p.life * 0.5);
      ctx.lineTo(px - p.size * p.life * 0.866, py + p.size * p.life * 0.5);
      ctx.closePath();
      ctx.fill();
    }
  });
  ctx.globalAlpha = 1;
  
  // draw selection line
  if (state.selected) {
    const sel = SYMBOLS.find(s => s.id === state.selected);
    if (sel) {
      ctx.strokeStyle = sel.color;
      ctx.lineWidth = 2;
      ctx.setLineDash([5, 5]);
      ctx.beginPath();
      ctx.arc(sel.x - state.camera.x, sel.displayY - state.camera.y, 35, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }
}

function onCanvasClick(e) {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left + state.camera.x; // Welt-Koordinaten
  const my = e.clientY - rect.top + state.camera.y;
  processClick(mx, my);
}

function onTouchStart(e) {
  e.preventDefault();
  const touch = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const mx = touch.clientX - rect.left + state.camera.x;
  const my = touch.clientY - rect.top + state.camera.y;
  processClick(mx, my);
}

function processClick(mx, my) {
  // mx/my sind jetzt Welt-Koordinaten (nach Camera-Offset)
  SYMBOLS.forEach(s => {
    const dist = Math.sqrt((mx - s.x) ** 2 + (my - s.displayY) ** 2);

    if (dist < 50) {
      handleSymbolClick(s);
    }
  });
}

function handleSymbolClick(s) {
  // Auto-start timer when player has enough symbols and no challenge active
  if (!state.timerActive && state.collected.length >= 3 && !state.dailyDone) {
    startTimer();
  }

  if (!state.collected.includes(s.id)) {
    state.collected.push(s.id);
    state.xp += 2;
    showRecipeLog(`ðŸœ ${s.glyph} ${s.name} entdeckt! +2 XP`);
    checkLevelUp();
    state.combo = 0;
    save();
    updateHUD();
    renderGrimoire();

  if (!localStorage.getItem('nemo-tutorial-done')) { tutorialStep = 0; showTutorial(); }
    return;
  }


  if (state.selected === s.id) {
    state.selected = null;
    state.combo = 0;
    showRecipeLog(`${s.glyph} AbgewÃ¤hlt.`);
  } else if (state.selected) {
    const now = Date.now();
    const recipe = RECIPES.find(r =>
      (r.ingredients.includes(state.selected) && r.ingredients.includes(s.id)) ||
      (r.ingredients[0] === state.selected && r.ingredients[1] === s.id) ||
      (r.ingredients[1] === state.selected && r.ingredients[0] === s.id)
    );

    if (recipe) {
      const isNew = !state.discoveredRecipes.find(r => r.result === recipe.result);
      const comboBonus = (now - state.lastCombineTime < 3000) ? Math.min(state.combo * 2, 10) : 0;

      if (isNew) {
        state.discoveredRecipes.push(recipe);
        playSound('combine');
        state.xp += 5 + comboBonus;
        state.score += 10 + comboBonus;
        state.combo++;
        
        // PHASE 3: NEUES SYMBOL IN WELT SPAWNEN!
        spawnResultSymbol(recipe.result, s);
        
        if (state.timerActive) {
          state.dailyDone++;
          if (state.dailyDone >= state.dailyTarget) {
            clearInterval(state.timerInterval);
            state.timerActive = false;
            state.score += 50;
            showRecipeLog(`ðŸ† TAGES-CHALLENGE GESCHAFFT! +50 Bonus!`);
          }
        }
        showRecipeLog(`âœ¨ ${recipe.desc} NEU! +${5 + comboBonus} XP ${comboBonus ? `(+${comboBonus} Combo!)` : ''}`);
        checkLevelUp();
      } else {
        state.xp += 1 + Math.floor(comboBonus / 2);
        state.score += 2;
        showRecipeLog(`ðŸ”„ Schon entdeckt. +${1 + Math.floor(comboBonus / 2)} XP`);
      }
      state.lastCombineTime = now;
    } else {
      showRecipeLog(`âŒ Keine Reaktion... ${state.combo > 0 ? 'Combo verloren.' : ''}`);
      state.combo = 0;
    }
    state.selected = null;
  } else {
    state.selected = s.id;
    showRecipeLog(`${s.glyph} ${s.name} aktiviert`);
  }

  if (state.score > state.highScore) {
    state.highScore = state.score;
  }

  save();
  updateHUD();
}

function startTimer() {
  state.timerActive = true;
  state.timeLeft = 60;
  state.dailyDone = 0;
  showRecipeLog(`â±ï¸ 60-Sekunden-Challenge! Finde ${state.dailyTarget} neue Rezepte!`);
  state.timerInterval = setInterval(() => {
    state.timeLeft--;
    updateHUD();
    if (state.timeLeft <= 0) {
      clearInterval(state.timerInterval);
      state.timerActive = false;
      showRecipeLog(`â±ï¸ Zeit vorbei! ${state.dailyDone}/${state.dailyTarget} geschafft.`);
      updateHUD();
    }
  }, 1000);
}

function checkLevelUp() {
  while (state.xp >= state.xpToNext) {
    state.xp -= state.xpToNext;
    state.level++;
    state.xpToNext = Math.floor(state.xpToNext * 1.5);
    // PHASE 6: Welt wÃ¤chst mit Level
    const newWorldSize = state.getWorldSize(state.level);
    state.world.width = newWorldSize;
    state.world.height = newWorldSize;
    playSound('levelUp');
    showRecipeLog(`ðŸŽ‰ Level ${state.level} erreicht! Neue Welt: ${newWorldSize}x${newWorldSize}`);
    save(); // Auto-Save bei Level-Up
  }
}

function showRecipeLog(msg) {
  const el = document.getElementById('recipe-log');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function updateHUD() {
  document.getElementById('hud-name').textContent = state.name;
  document.getElementById('hud-level').textContent = state.level;
  document.getElementById('hud-symbols').textContent = state.collected.length + '/' + SYMBOLS.length;
  
  // Score + Combo anzeigen
  let extra = '';
  if (state.score > 0) extra += ` | ðŸ† ${state.score}`;
  if (state.combo > 1) extra += ` | âš¡${state.combo}x`;
  if (state.timerActive) extra += ` | â±ï¸ ${state.timeLeft}s`;
  if (state.highScore > 0) extra += ` | â˜… ${state.highScore}`;
  
  const symbolsEl = document.getElementById('hud-symbols');
  symbolsEl.textContent = state.collected.length + '/' + SYMBOLS.length + extra;
}

function toggleGrimoire() {
  const el = document.getElementById('grimoire');
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

// BIOME SYSTEM: Wechsle zwischen IGNIS/AQUA/TERRA/AETHER
function switchBiome() {
  const biomes = ['IGNIS', 'AQUA', 'TERRA', 'AETHER'];
  const idx = biomes.indexOf(state.currentBiome);
  state.currentBiome = biomes[(idx + 1) % biomes.length];
  
  // Update HUD indicator
  const indicator = document.getElementById('biome-indicator');
  const biome = state.biomes[state.currentBiome];
  indicator.textContent = biome.name;
  indicator.style.color = biome.color;
  
  // Update background
  const canvas = document.getElementById('canvas');
  document.body.style.background = `linear-gradient(135deg, ${biome.bgGrad[0]}, ${biome.bgGrad[1]})`;
  
  showRecipeLog('🌍 Biome gewechselt: ' + biome.name);
}

function renderGrimoire() {
  const grid = document.getElementById('grimoire-grid');
  grid.innerHTML = '';
  const query = (document.getElementById('grimoire-search')?.value || '').toLowerCase();

  SYMBOLS.forEach(s => {
    if (query && !s.name.toLowerCase().includes(query) && !s.desc.toLowerCase().includes(query) && !s.biome.toLowerCase().includes(query)) return;
    const collected = state.collected.includes(s.id);
    const recipe = state.discoveredRecipes.find(r => r.result === s.id);

    const card = document.createElement('div');
    card.className = 'symbol-card';
    card.style.opacity = collected ? 1 : 0.4;
    card.innerHTML = `
      <div class="glyph">${s.glyph}</div>
      <div class="name">${s.name}</div>
      <div class="desc">${s.desc}</div>
      ${recipe ? '<div style="color:#4ecdc4;margin-top:0.5em;font-size:0.8em;">âœ¨ Rezept!</div>' : ''}
    `;
    grid.appendChild(card);
  });
}

// === HINT SYSTEM ===
const HINTS = [
  { check: () => true,                                    hint: 'Klicke auf Symbole in der Welt um sie zu sammeln.' },
  { check: () => state.collected.length > 0 && !state.discoveredRecipes.length, hint: 'Du hast Symbole gesammelt. Versuche zwei davon im Grimoire zu kombinieren!' },
  { check: () => state.collected.includes('ignis') && state.collected.includes('aqua') && !state.discoveredRecipes.find(r => r.result === 'vita'), hint: 'Ignis (Feuer) und Aqua (Wasser) ergeben zusammen etwas Neues...' },
  { check: () => state.collected.includes('terra') && state.collected.includes('aqua') && !state.discoveredRecipes.find(r => r.result === 'ignis'), hint: 'Terra (Erde) und Wasser... manchmal entzÃ¼ndet sich etwas.' },
  { check: () => state.collected.includes('aether') && state.collected.includes('ignis') && !state.discoveredRecipes.find(r => r.result === 'terra'), hint: 'Aether (Geist) und Feuer... der Geist manifestiert sich!' },
  { check: () => state.collected.includes('vita') && state.collected.includes('terra') && !state.discoveredRecipes.find(r => r.result === 'aether'), hint: 'Vita (Leben) und Terra (Erde)... alles kehrt zurÃ¼ck.' },
  { check: () => state.discoveredRecipes.length > 0, hint: 'Du hast schon ein Rezept entdeckt! Versuche mehr Symbole zu sammeln und zu kombinieren.' },
];

function showHint() {
  // Find first matching hint
  const hint = HINTS.find(h => h.check());
  if (hint) {
    showRecipeLog('ðŸ’¡ ' + hint.hint);
  }
}

// PHASE 3: Neues Symbol spawnen wenn Recipe entdeckt wird
function spawnResultSymbol(resultId, sourceSymbol) {
  const resultSymbol = SYMBOLS.find(s => s.id === resultId);
  if (!resultSymbol) return;
  
  // Bereits in der Welt?
  if (state.collected.includes(resultId)) {
    // Symbol zurÃ¼cksetzen damit es wieder spawnt
    state.collected = state.collected.filter(id => id !== resultId);
  }
  
  // Spawn Position: Random im Umkreis um Player
  const angle = Math.random() * Math.PI * 2;
  const dist = 150 + Math.random() * 250;
  const nx = state.avatar.x + Math.cos(angle) * dist;
  const ny = state.avatar.y + Math.sin(angle) * dist;
  
  // Clamp to world
  const x = Math.max(100, Math.min(state.world.width - 100, nx));
  const y = Math.max(100, Math.min(state.world.height - 100, ny));
  
  // Particles burst!
  for (let i = 0; i < 25; i++) {
    state.particles.push({
      x: x,
      y: y,
      vx: (Math.random() - 0.5) * 12,
      vy: (Math.random() - 0.5) * 12 - 3,
      life: 1.0,
      color: resultSymbol.color,
      size: 4 + Math.random() * 6
    });
  }
  
  // Neues Symbol in die Welt setzen
  resultSymbol.x = x;
  resultSymbol.y = y;
  
  // Message
  showRecipeLog(`ðŸŒŸ ${resultSymbol.glyph} ${resultSymbol.name} wurde geboren! Finde es in der Welt!`);
}

let tutorialStep = 0;

function showTutorial() {
  const modal = document.getElementById('tutorial');
  const content = document.getElementById('tutorial-content');
  const step = TUTORIAL_STEPS[tutorialStep];
  const total = TUTORIAL_STEPS.length;
  content.innerHTML = '<div style="font-size:48px;margin-bottom:15px;">' + step.emoji + '</div><h2 style="margin:0 0 15px 0;color:#e94560;">' + step.title + '</h2><p style="line-height:1.6;color:#ccc;margin:0;">' + step.text + '</p><div style="margin-top:20px;color:#555;font-size:12px;">Schritt ' + (tutorialStep + 1) + ' von ' + total + '</div>';
  document.getElementById('tutorial-prev').style.display = tutorialStep > 0 ? 'inline-block' : 'none';
  document.getElementById('tutorial-next').textContent = tutorialStep === total - 1 ? 'Los gehts!' : 'Weiter';
  modal.style.display = 'flex';
}

function tutorialNext() {
  const total = TUTORIAL_STEPS.length;
  if (tutorialStep < total - 1) { tutorialStep++; showTutorial(); }
  else { tutorialFinish(); }
}

function tutorialPrev() {
  if (tutorialStep > 0) { tutorialStep--; showTutorial(); }
}

function tutorialSkip() { tutorialFinish(); }

function tutorialFinish() {
  if (document.getElementById('tutorial-never').checked) {
    localStorage.setItem('nemo-tutorial-done', 'true');
  }
  document.getElementById('tutorial').style.display = 'none';
  canvas = document.getElementById('canvas');
  ctx = canvas.getContext('2d');
  resize();
  window.addEventListener('resize', resize);
  canvas.addEventListener('click', onCanvasClick);
  canvas.addEventListener('touchstart', onTouchStart, { passive: false });
  window.addEventListener('keydown', (e) => { state.keys[e.key.toLowerCase()] = true; });
  window.addEventListener('keyup', (e) => { state.keys[e.key.toLowerCase()] = false; });
  setInterval(() => save(), 60000);
  window.addEventListener('beforeunload', save);
  window.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') save(); });
  loop();
}
